<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crimson Moonflare</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cinzel+Decorative:wght@700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --crimson:    #c0182a;
      --blood:      #7a0012;
      --ember:      #ff4d1a;
      --pale:       #e8d5c4;
      --ash:        #a89888;
      --dark:       #0a0608;
      --charcoal:   #130c0e;
      --nav-w:      260px;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--dark);
      color: var(--pale);
      font-family: 'Rajdhani', sans-serif;
    }

    /* ── NOISE OVERLAY ───────────────────────────── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.04;
      pointer-events: none;
    }

    /* ── LEFT NAV ────────────────────────────────── */
    nav {
      position: fixed; left: 0; top: 0; bottom: 0;
      width: var(--nav-w);
      z-index: 100;
      display: flex; flex-direction: column;
      padding: 48px 0 48px 40px;
      border-right: 1px solid rgba(192,24,42,0.18);
      background: linear-gradient(to right, rgba(10,6,8,0.97) 70%, rgba(10,6,8,0.0));
    }

    .nav-logo {
      margin-bottom: 60px;
      display: flex; align-items: center; gap: 10px;
    }

    .nav-logo-mark {
      width: 28px; height: 28px;
      border: 1.5px solid var(--crimson);
      transform: rotate(45deg);
      position: relative;
      flex-shrink: 0;
    }

    .nav-logo-mark::after {
      content: '';
      position: absolute; inset: 5px;
      background: var(--crimson);
      transform: rotate(0deg);
    }

    .nav-logo-text {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 13px;
      letter-spacing: 0.28em;
      color: var(--ash);
      line-height: 1.2;
    }

    nav ul {
      list-style: none;
      display: flex; flex-direction: column;
      gap: 4px;
    }

    nav ul li a {
      display: block;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 0.12em;
      color: var(--ash);
      text-decoration: none;
      padding: 6px 0;
      position: relative;
      transition: color 0.25s;
    }

    nav ul li a::before {
      content: '';
      position: absolute; left: -40px; top: 50%;
      transform: translateY(-50%);
      width: 0; height: 1px;
      background: var(--crimson);
      transition: width 0.3s ease;
    }

    nav ul li a:hover { color: var(--pale); }
    nav ul li a:hover::before { width: 30px; }

    nav ul li.active a {
      color: var(--pale);
    }
    nav ul li.active a::before { width: 30px; background: var(--ember); }

    .nav-bottom {
      font-size: 10px;
      letter-spacing: 0.2em;
      color: rgba(168,152,136,0.55);
      text-transform: uppercase;
    }

    /* ── MAIN STAGE ──────────────────────────────── */
    main {
      position: fixed; inset: 0;
      margin-left: var(--nav-w);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }

    /* ── BACKGROUND GRAPHIC ──────────────────────── */
    .bg-layer {
      position: absolute; inset: 0;
      z-index: 0;
    }

    /* Radial glow */
    .bg-layer::before {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 70vw; height: 70vw;
      background: radial-gradient(ellipse, rgba(122,0,18,0.35) 0%, rgba(192,24,42,0.08) 40%, transparent 70%);
      animation: breathe 6s ease-in-out infinite;
    }

    @keyframes breathe {
      0%,100% { transform: translate(-50%,-50%) scale(1); opacity: 0.9; }
      50%      { transform: translate(-50%,-50%) scale(1.08); opacity: 1; }
    }

    /* Moon circle */
    .moon {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 340px; height: 340px;
      border-radius: 50%;
      background: radial-gradient(circle at 38% 38%,
        #1a0508 0%, #0d0204 60%, #050101 100%);
      box-shadow:
        0 0 0 1px rgba(192,24,42,0.25),
        0 0 60px rgba(192,24,42,0.15),
        0 0 120px rgba(192,24,42,0.08);
      overflow: hidden;
    }

    /* Moon surface texture rings */
    .moon::before {
      content: '';
      position: absolute; inset: -20px;
      background:
        repeating-radial-gradient(circle at 38% 38%,
          transparent 0px, transparent 28px,
          rgba(192,24,42,0.03) 28px, rgba(192,24,42,0.03) 29px);
    }

    /* Moon crack / blood streak */
    .moon::after {
      content: '';
      position: absolute;
      top: 10%; left: 35%;
      width: 2px; height: 65%;
      background: linear-gradient(to bottom,
        transparent, rgba(192,24,42,0.6) 40%, rgba(255,77,26,0.4) 70%, transparent);
      transform: rotate(12deg);
      filter: blur(1px);
    }

    /* Orbit ring */
    .orbit {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%,-50%) rotate(-18deg);
      width: 420px; height: 420px;
      border-radius: 50%;
      border: 1px solid rgba(192,24,42,0.18);
      animation: orbit-spin 40s linear infinite;
    }

    .orbit::before {
      content: '';
      position: absolute;
      top: -3px; left: 50%;
      transform: translateX(-50%);
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--ember);
      box-shadow: 0 0 12px var(--ember), 0 0 24px rgba(255,77,26,0.5);
    }

    @keyframes orbit-spin {
      from { transform: translate(-50%,-50%) rotate(-18deg); }
      to   { transform: translate(-50%,-50%) rotate(342deg); }
    }

    /* Outer orbit ring 2 */
    .orbit-2 {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%,-50%) rotate(60deg);
      width: 520px; height: 260px;
      border-radius: 50%;
      border: 1px solid rgba(192,24,42,0.08);
      animation: orbit-spin 65s linear infinite reverse;
    }

    /* Scattered blood particles */
    .particles {
      position: absolute; inset: 0; z-index: 1;
      pointer-events: none;
    }

    .p {
      position: absolute;
      border-radius: 50%;
      background: var(--crimson);
      animation: float-p var(--dur) ease-in-out infinite;
      opacity: var(--op);
    }

    @keyframes float-p {
      0%,100% { transform: translateY(0) scale(1); }
      50%      { transform: translateY(var(--dy)) scale(var(--sc)); }
    }

    /* ── BAND NAME ───────────────────────────────── */
    .center-text {
      position: relative; z-index: 10;
      text-align: center;
      user-select: none;
    }

    .eyebrow {
      font-family: 'Rajdhani', sans-serif;
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.5em;
      color: var(--crimson);
      text-transform: uppercase;
      margin-bottom: 16px;
      animation: fadein 2s ease forwards;
      opacity: 0;
      animation-delay: 0.4s;
    }

    .band-name {
      font-family: 'Cinzel Decorative', serif;
      font-weight: 900;
      font-size: clamp(36px, 5.5vw, 76px);
      line-height: 1.05;
      letter-spacing: 0.06em;
      color: var(--pale);
      text-shadow:
        0 0 40px rgba(192,24,42,0.5),
        0 0 80px rgba(192,24,42,0.2),
        2px 2px 0px rgba(0,0,0,0.8);
      animation: fadein 2s ease forwards;
      opacity: 0;
      animation-delay: 0.8s;
    }

    .band-name span {
      display: block;
      color: var(--crimson);
      text-shadow:
        0 0 30px rgba(255,77,26,0.6),
        0 0 60px rgba(192,24,42,0.4);
    }

    .tagline {
      margin-top: 22px;
      font-size: 12px;
      letter-spacing: 0.35em;
      color: var(--ash);
      text-transform: uppercase;
      font-weight: 300;
      animation: fadein 2s ease forwards;
      opacity: 0;
      animation-delay: 1.4s;
    }

    .divider {
      margin: 18px auto;
      width: 60px; height: 1px;
      background: linear-gradient(to right, transparent, var(--crimson), transparent);
      animation: fadein 2s ease forwards;
      opacity: 0;
      animation-delay: 1.1s;
    }

    @keyframes fadein {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── SOCIAL HINT BOTTOM RIGHT ────────────────── */
    .social-hint {
      position: fixed;
      bottom: 36px; right: 40px;
      z-index: 100;
      display: flex; flex-direction: column;
      align-items: flex-end;
      gap: 14px;
      animation: fadein 2s ease forwards;
      opacity: 0;
      animation-delay: 2s;
    }

    .social-label {
      font-size: 9px;
      letter-spacing: 0.3em;
      color: rgba(168,152,136,0.6);
      text-transform: uppercase;
      writing-mode: vertical-rl;
      text-orientation: mixed;
      transform: rotate(180deg);
      margin-left: 4px;
    }

    .social-links {
      display: flex; flex-direction: column;
      align-items: center;
      gap: 18px;
    }

    .social-line {
      width: 1px; height: 40px;
      background: linear-gradient(to bottom, transparent, rgba(192,24,42,0.5));
    }

    .social-icon {
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      border: 1px solid rgba(192,24,42,0.3);
      border-radius: 2px;
      text-decoration: none;
      transition: border-color 0.2s, background 0.2s;
      color: var(--ash);
    }

    .social-icon:hover {
      border-color: var(--crimson);
      background: rgba(192,24,42,0.12);
      color: var(--pale);
    }

    .social-icon svg {
      width: 14px; height: 14px;
      fill: currentColor;
    }

    /* ── MINI PLAYER ─────────────────────────────── */
    .mini-player {
      margin-top: auto;
      margin-bottom: 24px;
      padding-right: 40px;
      border-top: 1px solid rgba(192,24,42,0.12);
      padding-top: 20px;
    }

    .mini-player-label {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 9px;
      letter-spacing: 0.35em;
      color: var(--crimson);
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .mini-player-track {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .mini-player-art {
      width: 36px; height: 36px;
      flex-shrink: 0;
      background: var(--charcoal);
      border: 1px solid rgba(192,24,42,0.2);
      display: flex; align-items: center; justify-content: center;
    }

    .mini-player-art svg {
      width: 14px; height: 14px;
      fill: none;
      stroke: rgba(192,24,42,0.4);
      stroke-width: 1.5;
    }

    .mini-player-info { flex: 1; min-width: 0; }

    .mini-player-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 14px;
      letter-spacing: 0.06em;
      color: var(--pale);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 2px;
    }

    .mini-player-sub {
      font-size: 10px;
      font-weight: 300;
      color: rgba(168,152,136,0.55);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: 0.04em;
    }

    .mini-player-bar {
      height: 2px;
      background: rgba(192,24,42,0.15);
      border-radius: 2px;
      position: relative;
      margin-bottom: 12px;
    }

    .mini-player-bar::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 35%;
      background: var(--crimson);
      border-radius: 2px;
    }

    .mini-player-controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .mini-ctrl {
      color: rgba(168,152,136,0.5);
      display: flex; align-items: center; justify-content: center;
      cursor: default;
    }

    .mini-ctrl svg { width: 12px; height: 12px; fill: currentColor; }

    .mini-ctrl.play {
      width: 28px; height: 28px;
      border: 1px solid rgba(192,24,42,0.35);
      border-radius: 50%;
      color: var(--pale);
    }

    .mini-ctrl.play svg { width: 10px; height: 10px; margin-left: 1px; }

  </style>
</head>
